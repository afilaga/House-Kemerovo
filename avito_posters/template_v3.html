<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --safe-zone: 80px;
      --yellow: #FFDE00;
      /* Avito red for high importance tags */
      --red: #FF3B30;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1600px;
      height: 1200px;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      background: #000;
      display: flex;
    }

    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    /* === OVERLAYS (V3 - Refined Swiss) === */
    .overlay-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0) 25%, rgba(0, 0, 0, 0) 65%, rgba(0, 0, 0, 0.7) 100%);
      z-index: 2;
    }

    .overlay-inner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.65) 0%, rgba(0, 0, 0, 0.3) 40%, rgba(0, 0, 0, 0) 80%);
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      padding: 80px 80px 80px 140px;
      /* Safe left indent */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* === COVER STYLES (V3) === */
    #cover-view {
      width: 100%;
      height: 100%;
      flex-direction: column;
      justify-content: space-between;
    }

    .cover-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .status-tag {
      background: #E60000;
      color: #FFFFFF;
      font-weight: 900;
      font-size: 28px;
      padding: 14px 28px;
      border-radius: 0px;
      text-transform: uppercase;
      letter-spacing: -1px;
    }

    .watermark-cover {
      background: transparent;
      color: #FFFFFF;
      font-size: 28px;
      font-weight: 800;
      padding: 0;
      border-radius: 0;
      letter-spacing: -2px;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
    }

    .cover-bottom {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .cover-badges {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .c-badge {
      background: rgba(0, 0, 0, 0.8);
      color: #FFFFFF;
      border: none;
      font-weight: 800;
      font-size: 26px;
      padding: 12px 28px;
      border-radius: 0px;
      text-transform: uppercase;
      letter-spacing: -1px;
    }

    .cover-price-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .c-title {
      color: #FFFFFF;
      font-weight: 900;
      font-size: 112px;
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: -5px;
      padding-bottom: 4px;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    }

    .c-price {
      background: #E60000;
      color: #FFFFFF;
      font-weight: 900;
      font-size: 64px;
      padding: 12px 32px;
      line-height: 1;
      letter-spacing: -3px;
      border-radius: 0px;
      box-shadow: 0 15px 30px rgba(230, 0, 0, 0.4);
    }

    /* === INNER SLIDES STYLES (V3) === */
    .inner-layout {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }

    /* V3 Swiss Style - Reduced 20% */
    .info-card {
      background: transparent;
      padding: 0;
      border: none;
      box-shadow: none;
      border-left: none;
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 640px;
      padding-top: 32px;
    }

    .i-watermark {
      align-self: flex-start;
      background: transparent;
      color: #FFFFFF;
      font-weight: 800;
      font-size: 20px;
      padding: 0;
      border-radius: 0px;
      text-transform: uppercase;
      letter-spacing: -1px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .i-titles {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .i-subtitle {
      color: #E60000;
      font-size: 32px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -2px;
    }

    .i-title {
      color: #FFFFFF;
      font-size: 72px;
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -4px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
    }

    .i-features {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 20px;
      border-left: 8px solid #E60000;
      padding-left: 24px;
    }

    .i-feature {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .check-icon {
      display: none;
    }

    .feat-text {
      font-size: 36px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -1px;
      line-height: 1.1;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>

<body>
  <div class="bg-image" id="bg"></div>
  <div id="overlay-layer"></div>

  <div class="content">

    <!-- COVER LAYOUT -->
    <div id="cover-view" style="display: none;">
      <div class="cover-top">
        <div class="status-tag">Продается</div>
        <div class="watermark-cover" id="c-watermark">Кемерово, р-н Кировский</div>
      </div>
      <div class="cover-bottom">
        <div class="cover-badges" id="c-badges"></div>
        <div class="cover-price-row">
          <div class="c-title" id="c-title"></div>
          <div class="c-price" id="c-price"></div>
        </div>
      </div>
    </div>

    <!-- INNER LAYOUT -->
    <div id="inner-view" class="inner-layout">
      <div class="info-card">
        <div class="i-watermark" id="i-watermark"></div>
        <div class="i-titles">
          <div class="i-subtitle" id="i-subtitle"></div>
          <div class="i-title" id="i-title"></div>
        </div>
        <div class="i-features" id="i-features"></div>
      </div>
    </div>

  </div>

  <script>
    const checkSvg = `<svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>`;

    function renderInfo() {
      const data = window.setupData || {};

      let imgUrl = data.image || '';
      if (imgUrl && !imgUrl.startsWith('http') && !imgUrl.startsWith('data:') && !imgUrl.startsWith('file://')) {
        imgUrl = imgUrl;
      }
      document.getElementById('bg').style.backgroundImage = `url('${imgUrl}')`;

      if (data.isCover) {
        document.getElementById('overlay-layer').className = 'overlay-cover';
        document.getElementById('cover-view').style.display = 'flex';
        document.getElementById('inner-view').style.display = 'none';

        document.getElementById('c-watermark').innerText = data.watermark || '';
        document.getElementById('c-title').innerText = data.title || '';
        document.getElementById('c-price').innerText = data.price || '';

        const badgesContainer = document.getElementById('c-badges');
        badgesContainer.innerHTML = '';
        (data.badges || []).forEach(b => {
          badgesContainer.innerHTML += `<div class="c-badge">${b}</div>`;
        });
      } else {
        document.getElementById('overlay-layer').className = 'overlay-inner';
        document.getElementById('cover-view').style.display = 'none';
        document.getElementById('inner-view').style.display = 'flex';

        document.getElementById('i-watermark').innerText = data.watermark || '';
        document.getElementById('i-subtitle').innerText = data.subtitle || '';
        document.getElementById('i-title').innerText = data.title || '';

        const featContainer = document.getElementById('i-features');
        featContainer.innerHTML = '';
        (data.features || []).forEach(f => {
          featContainer.innerHTML += `
            <div class="i-feature">
              <div class="check-icon">${checkSvg}</div>
              <div class="feat-text">${f}</div>
            </div>`;
        });
      }
    }

    if (window.setupData) renderInfo();
  </script>
</body>

</html>
